<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; margin: 0; padding: 12px; background: #1c1b22; color: #fff;
           font: 13px system-ui, sans-serif; }
    header { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
    header img { width: 26px; height: 26px; }
    header .title { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
    header .by { margin-left: auto; font-size: 10px; opacity: .4; text-transform: uppercase;
                 letter-spacing: .5px; }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; opacity: .55;
         margin: 14px 2px 8px; }
    .row { display: flex; align-items: center; gap: 6px; padding: 6px; background: #2b2a33;
           border-radius: 8px; margin-bottom: 5px; }
    .row.active { box-shadow: inset 0 0 0 2px #0060df; }
    .row .icon { width: 34px; text-align: center; font-size: 16px; background: #42414d;
                 border: none; border-radius: 6px; color: #fff; padding: 6px 0; cursor: pointer; }
    .row .name { flex: 1; min-width: 0; background: #42414d; border: none; border-radius: 6px;
                 color: #fff; padding: 7px; font: inherit; }
    .row .count { opacity: .5; font-size: 11px; min-width: 28px; text-align: right; }
    .row button { background: #42414d; border: none; border-radius: 6px; color: #fff;
                  cursor: pointer; padding: 6px 7px; font: inherit; }
    .row button:hover:not(:disabled) { background: #52525e; }
    .row button:disabled { opacity: .3; cursor: default; }
    .row .del { background: #5a2a2a; }
    .row .del:hover:not(:disabled) { background: #7a3434; }
    .row .open { min-width: 60px; box-sizing: border-box; text-align: center; }
    .row .open:not(:disabled) { background: #0060df; }
    .row.active .open:disabled { background: #2a7d46; color: #fff; opacity: 1; }
    .addbar { display: flex; gap: 6px; margin-top: 8px; }
    .addbar .icon { width: 44px; text-align: center; cursor: pointer; }
    .addbar input { background: #2b2a33; border: 1px solid #42414d; border-radius: 6px;
                    color: #fff; padding: 7px; font: inherit; min-width: 0; }
    .addbar .name { flex: 1; }
    .addbar .go, .primary { background: #0060df; border: none; border-radius: 6px; color: #fff;
                            cursor: pointer; padding: 7px 12px; font: inherit; }
    .addbar .go:hover, .primary:hover { background: #0250bb; }
    .reset { width: 100%; margin-top: 10px; background: #0060df; border: none; border-radius: 6px;
             color: #fff; cursor: pointer; padding: 8px; font: inherit; }
    .reset:hover { background: #0250bb; }
    /* icon palette — centered modal overlay */
    #paletteOverlay { position: fixed; inset: 0; z-index: 50; display: none;
                      align-items: center; justify-content: center;
                      background: rgba(0,0,0,.55); padding: 16px; }
    #paletteOverlay.open { display: flex; }
    #palette { display: flex; flex-wrap: wrap; gap: 2px;
               width: 100%; max-width: 268px; max-height: 320px; overflow-y: auto; padding: 8px;
               background: #34333c; border: 1px solid #52525e; border-radius: 10px;
               box-shadow: 0 10px 30px rgba(0,0,0,.6); }
    #palette button { width: 26px; height: 26px; font-size: 15px; background: none; border: none;
                      border-radius: 5px; cursor: pointer; line-height: 1; }
    #palette button:hover { background: #52525e; }
    #palette .pal-head { flex-basis: 100%; font-size: 10px; text-transform: uppercase;
                         letter-spacing: .5px; opacity: .45; padding: 7px 2px 3px;
                         border-top: 1px solid #4a4954; margin-top: 3px; }
    #palette .pal-head:first-child { border-top: none; margin-top: 0; padding-top: 2px; }
    /* in-popup confirm dialog */
    #modal { position: fixed; inset: 0; z-index: 100; display: none;
             align-items: center; justify-content: center;
             background: rgba(0,0,0,.55); padding: 16px; }
    #modal.open { display: flex; }
    #modal .box { background: #2b2a33; border: 1px solid #42414d; border-radius: 10px;
                  padding: 16px; width: 100%; max-width: 280px;
                  box-shadow: 0 10px 30px rgba(0,0,0,.6); }
    #modal .msg { font-size: 13px; line-height: 1.45; margin-bottom: 14px; word-break: break-word; }
    #modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
    #modal button { border: none; border-radius: 6px; color: #fff; cursor: pointer;
                    padding: 7px 14px; font: inherit; }
    #modal .cancel { background: #42414d; }
    #modal .cancel:hover { background: #52525e; }
    #modal .ok { background: #5a2a2a; }
    #modal .ok:hover { background: #7a3434; }
    /* cross-panel tab search */
    #search { width: 100%; box-sizing: border-box; margin: 8px 0 4px; background: #2b2a33;
              border: 1px solid #42414d; border-radius: 8px; color: #fff; padding: 8px 10px;
              font: inherit; }
    #search:focus { outline: none; border-color: #0060df; }
    #results { display: none; flex-direction: column; gap: 4px; margin-top: 6px;
               max-height: 360px; overflow-y: auto; }
    body.searching #results { display: flex; }
    body.searching #panels { display: none; }
    .res { display: flex; align-items: center; gap: 8px; padding: 7px 8px; background: #2b2a33;
           border-radius: 8px; cursor: pointer; }
    .res:hover { background: #34333c; }
    .res img.fav { width: 16px; height: 16px; flex: none; border-radius: 3px; }
    .res .fav-fallback { width: 16px; text-align: center; flex: none; }
    .res .res-main { flex: 1; min-width: 0; }
    .res .res-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .res .res-url { font-size: 11px; opacity: .45; white-space: nowrap; overflow: hidden;
                    text-overflow: ellipsis; }
    .res .res-panel { flex: none; font-size: 11px; opacity: .7; background: #42414d;
                      border-radius: 5px; padding: 3px 7px; max-width: 90px; white-space: nowrap;
                      overflow: hidden; text-overflow: ellipsis; }
    #results .empty { opacity: .5; font-size: 12px; padding: 10px 4px; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon-48.png" alt="">
    <span class="title">Houdini</span>
    <span class="by">Panels</span>
  </header>

  <input id="search" placeholder="🔍  Search tabs across all panels…" autocomplete="off">
  <div id="results"></div>

  <div id="panels">
    <h2>Panels — click Open to switch</h2>
    <div id="list"></div>
    <div class="addbar">
      <input class="icon" id="newIcon" value="📄" maxlength="4" title="Click to pick an icon">
      <input class="name" id="newName" placeholder="New panel name">
      <button class="go" id="addBtn">Add</button>
    </div>

    <button class="reset" id="manageBtn">Settings…</button>
  </div>

  <div id="paletteOverlay"><div id="palette"></div></div>

  <div id="modal">
    <div class="box">
      <div class="msg" id="modalMsg"></div>
      <div class="actions">
        <button class="cancel" id="modalCancel">Cancel</button>
        <button class="ok" id="modalOk">Remove</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
